# .github/workflows/ci.yml
# Pipeline CI : lint du backend sur chaque push/PR.
# Vercel et Render ont leurs propres pipelines de déploiement auto —
# pas besoin de les gérer ici pour l'instant.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Lint backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

  # À activer quand tu auras des tests (Phase 1+)
  # test-backend:
  #   name: Tests backend
  #   needs: lint-backend
  #   runs-on: ubuntu-latest
  #   ...
